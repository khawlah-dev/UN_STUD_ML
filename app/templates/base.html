<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}نظام توقع الطلاب{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-content">
            <a class="brand" href="{{ url_for('predict') }}">
                <span class="brand-icon">▣</span>
                <span>
                    توقع مؤشرات الاكتئاب لدى طلاب الجامعة
                    <small>مشروع أكاديمي بحثي للأغراض التعليمية فقط</small>
                </span>
            </a>
            <nav class="nav-links">
                <a class="{% if request.endpoint == 'predict' %}active{% endif %}" href="{{ url_for('predict') }}">التوقع</a>
                <a class="{% if request.endpoint == 'about' %}active{% endif %}" href="{{ url_for('about') }}">عن النموذج</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        مشروع بحثي أكاديمي، لا يمثل تشخيصا طبيا، جميع الحقوق محفوظة
    </footer>
</body>
</html>
